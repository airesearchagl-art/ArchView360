name: Playwright smoke tests

"on":
  pull_request:
  push:
    branches: [main]

# Cancel a still-running check from an older push once a newer one lands on
# the same PR/branch — avoids piling up redundant runs.
concurrency:
  group: playwright-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      # Chromium only — this repo's smoke suite doesn't exercise
      # Firefox/WebKit, and installing them would only add runner time.
      # No PLAYWRIGHT_EXECUTABLE_PATH override here: this step is the
      # thing being verified (standard Playwright-managed browser install
      # on a GitHub-hosted runner), not worked around.
      - run: npx playwright install --with-deps chromium

      - run: npm test

      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
